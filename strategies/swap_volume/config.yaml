# ============================================================================
# 币安合约做市/刷量策略配置
# 策略逻辑: 双边网格挂单 + Diff 差量更新 + 库存偏斜 + OBI 信号 + 三层熔断
#
# 凭证配置 (不在本文件):
#   BINANCE_API_KEY           ─┐
#   BINANCE_PRIVATE_KEY_PATH   ├─ 统一写到项目根目录的 .env 文件
#   BINANCE_DEMO (0/1)        ─┘
# ============================================================================

# ─── 基础配置 ────────────────────────────────────────────────────────────────

# 策略唯一标识, 用于日志文件名 (logs/<strategyId>_swap_volume.log) 和多实例区分
# 同机器跑多个策略时务必设置不同的 ID
strategyId: "SV_001"

# 合约交易对 (USDT/USDC 保证金合约)
# 常见选择: BTCUSDT, ETHUSDT, BTCUSDC, ETHUSDC
# 注意: 币种后缀决定保证金类型, USDC 合约手续费略低
symbol: "BTCUSDC"

# 杠杆倍数 (1-125, 取决于交易对等级)
# 杠杆只影响保证金占用, 不影响策略盈亏计算
# 建议做市策略使用低杠杆 (3-10x), 避免爆仓风险
# 支持热加载, 运行中修改会调用 /fapi/v1/leverage 重设
leverage: 5

# 保证金模式: "CROSSED" (全仓) 或 "ISOLATED" (逐仓)
# 全仓: 所有持仓共享保证金, 不容易爆仓但爆仓损失大
# 逐仓: 每个合约独立保证金, 爆仓只影响单个仓位
# 做市策略建议全仓, 因为波动小且需要灵活调仓
marginType: "CROSSED"

# ─── 策略核心参数 ────────────────────────────────────────────────────────────

strategy:
  # ─── 网格结构 ──────────────────────────────────────────────────────────────

  # 档位间距 (绝对价格, 字符串格式, 单位: 报价币 USDT/USDC)
  # 例: stepSize=1.0, BBO=60000 时, 买侧挂在 59999, 59998, 59997...
  # 注意事项:
  # - 太小 → 频繁被吃单+高 API 压力, 无价差利润
  # - 太大 → 成交率低, 刷量效率差
  # - 建议为 tickSize 的 10-100 倍 (BTC: 0.1-10 USDT)
  stepSize: "1.0"

  # 起始档位偏移
  # 0 = 第一档紧贴 BBO (bid - step*0, ask + step*0)
  # 1 = 跳过最内侧一档, 从 bid - step*1 开始 (避免成为 BBO 自己)
  # 高频策略常用 1 避免频繁吃自己的单, 做市策略常用 0 争取成交
  startLevel: 0

  # 每侧挂单档数
  # 总挂单数 = numOrdersEachSide * 2 (买+卖)
  # 档数多 → 捕获价格范围大但资金占用多
  # 档数少 → 命中率低但资金利用率高
  # 注意: 币安合约单账户限制 200 个挂单, 不要超过
  numOrdersEachSide: 5

  # 单档基础下单数量 (字符串格式, 单位: 基础币)
  # 必须符合交易对的 stepSize (LOT_SIZE filter), 下单前自动对齐
  # 且 quantity * price 必须 >= 5 USDT (minNotional)
  # BTC 合约 minQty 通常为 0.001, 对应约 60-80 USDT 名义价值
  quantity: "0.001"

  # 每档数量递增因子
  # 第 i 档实际数量 = quantity * (1 + sizeGrowthFactor * i)
  # 0   = 所有档位数量相同
  # 0.2 = 第2档×1.2, 第3档×1.4... (远离 BBO 的档位下更大单)
  # 刷量策略建议 0, 做市策略可适度 >0 利用远档成本摊薄
  sizeGrowthFactor: 0

  # ─── 仓位限制 ──────────────────────────────────────────────────────────────

  # 最大多头持仓 (单位: 基础币)
  # 持多超过此值时, 按比例减少买单档数 (库存偏斜):
  #   实际买档数 = numOrdersEachSide * max(1 - position/maximumLong, 0)
  # 达到 100% 时完全停止买入, 只挂卖单消化库存
  # 0 = 不限制 (危险, 单边行情会一直加仓)
  maximumLong: 0.01

  # 最大空头持仓 (单位: 基础币)
  # 持空超过此值时, 按比例减少卖单档数
  # 逻辑与 maximumLong 对称
  maximumShort: 0.01

  # 全局累计成交额上限 (买入额 + 卖出额, 单位: USDT/USDC)
  # 达到后自动触发 SIGINT 退出 (会走 shutdown 流程)
  # 0 = 不限制, 持续运行
  # 用于刷量任务: 完成指定成交量后自动停止
  maxVolume: 0

  # ─── 节奏控制 ──────────────────────────────────────────────────────────────

  # 主循环间隔 (秒), 每轮都会 diff + 撤/改/下单
  # 支持热加载, 运行中修改立即生效
  # 过小 (<0.5s) → 可能触发 API 限频
  # 过大 (>5s) → 市场反应慢, 挂单容易偏离
  orderInterval: 1

  # 程序退出时 (Ctrl+C / SIGTERM) 是否自动市价平仓
  # true  → shutdown 阶段先撤单再市价平所有持仓
  # false → 仅撤单, 持仓保留 (下次启动时通过 _sync_position 恢复)
  # 刷量任务建议 true, 长期做市可设 false 保留库存
  autoCloseOnExit: true

  # ─── OBI 盘口不平衡信号 ──────────────────────────────────────────────────

  # OBI 计算取前 N 档深度 (影响 WS depth 订阅层级)
  # 5, 10, 20 会分别订阅对应的 depth5/depth10/depth20 stream
  # 档数深 → 信号平滑但反应慢
  # 档数浅 → 信号灵敏但易被假单干扰
  imbalanceDepth: 5

  # OBI 触发阈值
  # OBI = bid_volume / ask_volume (前 N 档)
  # OBI > threshold (1.5)    → 买压强, 压缩卖侧
  # OBI < 1/threshold (0.67) → 卖压强, 压缩买侧
  # 1.0 ~ 2.0 是合理区间, 过小频繁触发, 过大几乎不触发
  imbalanceThreshold: 1.5

  # OBI 触发时的缩放系数 (0-1)
  # 被压缩一侧的数量或档数 × imbalanceLevelScale
  # 0.6 = 缩减 40%, 0 = 完全不挂被压侧
  # 越小策略越"顺势", 越大越"中性做市"
  imbalanceLevelScale: 0.6

  # OBI 生效模式
  # "quantity" = 压缩数量 (保留档数, 每档下更少量)
  # "levels"   = 压缩档数 (保留数量, 挂更少档)
  # quantity 模式更平滑, levels 模式信号更强
  imbalanceMode: "quantity"

  # ─── 改单优化 ──────────────────────────────────────────────────────────────

  # 改单价格容差 (单位: tick_size 的倍数)
  # 当 |活跃单价格 - 目标价格| <= priceTolerance * tickSize 时, 不改单
  # 0 = 任何偏差都改单 (精确但 API 消耗高)
  # 1-3 = 容忍小幅偏差, 减少 API 调用
  # 用途: 价格剧烈抖动时避免无意义的反复改单
  priceTolerance: 0

  # ─── 波动率熔断 ────────────────────────────────────────────────────────────

  # 波动率熔断总开关 (支持热加载)
  # true  → 启用三重判断 (绝对振幅 + 相对倍数 + 方向感知)
  # false → 完全关闭, 无论多大波动都不暂停
  volEnabled: true

  # 触发倍数: 当前振幅 / 历史基准振幅 > 此值 → 熔断
  # 基准 = 近 60 分钟每分钟振幅的中位数
  # 3x 是保守值, 1.5-5x 是常见区间
  volPauseMultiplier: 3

  # 恢复倍数: 熔断后, 当前振幅 / 基准 <= 此值 → 恢复
  # 必须 < volPauseMultiplier, 形成迟滞防止反复触发
  # 例: pause=3x, resume=1.3x → 超 3 倍停, 回到 1.3 倍恢复
  volResumeMultiplier: 1.3

  # 绝对振幅上限 (振幅/价格 比例)
  # 无论基准多少, 超过此值直接熔断
  # 0 = 不限制 (仅靠相对倍数判断)
  # 例: 0.002 = 1 分钟内价格波动超 0.2% 强制熔断
  # 主流币建议 0.003-0.01, 小币种可放宽
  volMaxRangePct: 0

  # 绝对安全振幅阈值 (振幅/价格 比例)
  # 当实际振幅低于此值时, 跳过相对倍数检查, 避免小波动误伤
  # 原理: 基准很小 (如 0.0001) 时, 正常波动也可能是 5x 基准
  # 0 = 始终检查相对倍数
  # 例: 0.0003 = 波动不超过 0.03% 时永远不会因相对倍数触发熔断
  volSafeRangePct: 0

  # 熔断时是否市价清仓
  # true  → 撤单 + 市价平所有持仓 (最保守, 防单边暴跌加剧损失)
  # false → 仅撤单暂停, 持仓保留等待恢复
  # 做市建议 false (熔断后市场反向回来可能赚大), 刷量建议 true
  volCloseOnPause: true

  # 方向感知熔断 (智能熔断)
  # true  → 持仓方向和市场走向一致 (赚钱中) 时, 不触发熔断
  # false → 只看波动率, 不看盈亏方向
  # 逻辑: 持多 + 价格上涨 = favorable, 持空 + 价格下跌 = favorable
  # 优点: 避免在盈利奔跑时过早止盈, 让利润跑
  # 风险: 若判断错方向会放大损失, 需配合 volPositionThreshold
  volDirectionAware: true

  # 方向感知生效的持仓门槛 (占 maximumLong/Short 的比例)
  # 只有 |position| / max >= 此值 且方向有利时才跳过熔断
  # 0.3 = 持仓达到 30% 上限时才启用方向感知
  # 原因: 持仓小时方向"有利"意义不大, 避免过度依赖方向判断
  volPositionThreshold: 0.3

  # ─── 成交活跃度熔断 (应对流动性枯竭) ────────────────────────────────────

  # 活跃度统计窗口 (分钟)
  # 统计最近 N 个自然分钟的成交笔数和时间覆盖率
  # 0 = 关闭活跃度熔断
  # 常用值 3-10 分钟, 过小样本不足, 过大反应迟钝
  activityWindow: 0

  # 最小活跃成交笔数 (每分钟)
  # 窗口内最大每分钟成交笔数 < activityMinTrades → 熔断
  # 0 = 关闭
  # 例: 30 = 要求至少有一分钟成交 30 笔以上
  # 用于过滤冷门时段, 避免低流动性下被少数玩家操纵
  activityMinTrades: 0

  # 恢复活跃笔数 (每分钟)
  # 窗口内最小每分钟成交笔数 >= 此值 → 恢复运行
  # 0 时默认为 activityMinTrades * 2 (迟滞)
  # 设置比触发值更高, 确保市场真的活跃起来
  activityResumeTrades: 0

  # 最小时间覆盖率 (0-1)
  # 要求每分钟内有成交的秒数占比 >= 此值
  # 0   = 不检查覆盖率 (只看总笔数)
  # 0.5 = 每分钟至少一半秒数有成交 (防止集中成交制造假活跃)
  # 0.8 = 严格要求, 用于高频策略
  activityMinCoverage: 0

  # 活跃度熔断时是否清仓
  # 逻辑同 volCloseOnPause, 但针对流动性不足场景
  # true  → 流动性差时平仓, 避免成交困难
  # false → 保留持仓等市场恢复
  activityCloseOnPause: true

  # ─── BNB 手续费管理 ──────────────────────────────────────────────────────

  # 合约账户 BNB 最低余额 (单位: BNB)
  # 低于此值自动现货买 BNB + 划转到合约
  # 0 = 关闭自动补充 (需手动保证 BNB)
  # 作用: BNB 抵扣手续费可打 10% 折扣, 不足时自动走 USDT 结算
  # 建议值: 预估 1-3 天手续费对应的 BNB 数量
  bnbMinBalance: 0

  # 每次补充时买入的 BNB 数量 (单位: BNB)
  # 通过现货市价单 BNBUSDT 买入, 再划转到合约
  # 太小 → 补充频繁, 太大 → 占用资金
  # 建议为 bnbMinBalance 的 3-5 倍
  bnbBuyAmount: 0.2

  # BNB 强制退出阈值 (单位: BNB)
  # 当 BNB 余额 < bnbExitBalance 时停止策略 (should_stop=True)
  # 0 = 关闭, 不会因 BNB 不足退出
  # 用途: 现货 BNB 买入失败时的兜底 (如现货账户也没钱)
  # 必须 < bnbMinBalance, 作为最后防线
  bnbExitBalance: 0

  # ─── GTX Post-Only 模式 ───────────────────────────────────────────────────

  # 是否使用 GTX (Post Only, Good Till Crossing) 挂单
  # true  → 挂单若会立即成交 (taker) 则拒绝, 保证只做 maker
  # false → 使用 GTC (普通限价单)
  #
  # GTX 优势:
  # - 只赚 maker 返佣, 不付 taker 手续费
  # - 严格控制成本
  # GTX 风险:
  # - 价格剧烈波动时大量拒单, 降低挂单率
  # - 策略会自动对超 3 次拒单的批次降级为 GTC (避免全军覆没)
  # 建议: 做市策略开启, 刷量策略关闭 (刷量需要成交)
  postOnly: false
