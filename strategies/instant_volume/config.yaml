# 即时刷量策略配置（币安现货）
#
# 策略逻辑:
# - 以卖一价挂限价买单，成交后立即按买一价挂限价卖单
# - 一买一卖完成后计入一轮成交
# - 限价单 + 超时撤单 + 部分成交处理 + REST 余额兜底 + 市价平仓
#
# 统计口径说明:
# - quantity: 每轮买入数量，单位为基础币
# - max_volume: 累计成交额上限（USDT），买入额 + 卖出额双边总和
#   停止条件 = (买入成交额 + 卖出成交额) >= max_volume
#   例: max_volume=200000 → 买+卖共 20 万 USDT 时退出 (单边约 10 万)

# 策略标识，只影响日志文件名和运行标识
strategy_id: "IV_001"

# 现货交易对
symbol: "XAUTUSDT"

# 每轮买入数量，单位为基础币数量
quantity: "0.3"

# 每轮完成后再次发起下一轮的等待时间，单位秒
order_interval: 1

# BBO 价差过滤（卖一价 - 买一价，单位 USDT 绝对值）
# 当前价差 > max_spread 时跳过本轮，<= max_spread 时正常执行
# 0 = 不限制
max_spread: 0.01

# 累计成交额上限，单位 USDT (买入额 + 卖出额双边总和)
# 停止条件: (买入成交额 + 卖出成交额) >= max_volume
max_volume: 200000

# 买单或卖单单次等待成交的超时时间，单位秒
order_timeout: 30
