# 币安现货双向做市策略 V2 配置
#
# 买卖双侧网格做市，与 OKX market_maker_v2 逻辑对齐
# 特性:
# - 买卖双侧网格挂单
# - 基于盘口买卖比的挂单层数偏斜
# - 分层递增的下单数量
# - 库存偏斜 (净持仓多→减少买层)
# - 波动率熔断与自动恢复
# - 现金流法盈亏计算
#
# 统计口径说明:
# - step: 绝对价格间隔，不是百分比
# - single_size: 第一档下单数量，单位为基础币；后续档位会叠加 size_growth_factor
# - max_volume: 买入成交额 + 卖出成交额（USDT），0 表示不限制

# 交易对
instrument_id: "XAUTUSDT"

strategy:
  # === 挂单节奏 ===
  # 主循环轮询间隔，单位秒
  loop_interval: 0.5

  # 每档挂单与 BBO 的绝对价差，单位为报价币（如 USDT）
  step: 0.01

  # 起始档位:
  # - 0: 从最靠近 BBO 的���档开始
  # - 1: 跳过最内侧一档，从外一档开始
  start_level: 0

  # 买盘和卖盘各自最多挂多少档
  num_of_order_each_side: 5

  # === 单笔下单参数 ===
  # 第一档基础下单数量，单位为基础币数量
  single_size: 0.3

  # 每往外一档，数量按 single_size * (1 + size_growth_factor * 档位序号) 增长
  # 设为 0 表示所有档位数量相同
  size_growth_factor: 0

  # === 仓位与成交限制 ===
  # 最大净买入量上限，超过后会减少买盘层数
  maximum_net_buy: 10

  # 最大净卖出量上限，超过后会减少卖盘层数
  maximum_net_sell: 10

  # 全局累计成交额上限，口径为买入成交额 + 卖出成交额，单位 USDT；0 表示不限制
  max_volume: 0

  # === 出货与退出 ===
  # 程序退出时，是否自动把剩余仓位市价卖出
  auto_close_on_exit: true

  # 当可盈利退出时(现金流法)，是否把可卖仓位集中挂到卖一附近快速卖出
  exit_on_profit: false

  # 当净买入仓位 / maximum_net_buy 达到该比例时，触发"加速出货"逻辑
  # 0 表示关闭该阈值判断
  exit_net_pct: 0

  # === v2 买卖比信号 ===
  # 盘口买卖比计算深度，表示取前多少档盘口做不平衡判断
  imbalance_depth: 5

  # 盘口不平衡阈值:
  # - > 该值: 认为买盘更强，压缩卖盘层数
  # - < 1 / 该值: 认为卖盘更强，压缩买盘层数
  imbalance_threshold: 1.5

  # 当盘口明显偏向一侧时，另一侧挂单层数乘以这个缩放系数
  imbalance_level_scale: 0.6

  # === v2 波动率熔断 ===
  # 熔断总开关: false=关闭熔断（支持热加载）
  vol_enabled: true

  # 绝对安全振幅阈值:
  # 当实际振幅已经低于该值时，可跳过相对倍数检查，避免小波动误伤
  vol_safe_range_pct: 0.001

  # 绝对振幅上限，range_pct 超过该值时直接触发熔断
  vol_max_range_pct: 0.002

  # 相对波动率熔断倍数:
  # 当前波动率 / 基准波动率 > 该值时触发暂停
  vol_pause_multiplier: 3

  # 熔断恢复倍数:
  # 当前波动率 / 基准波动率 <= 该值，且绝对振幅也安全时恢复运行
  vol_resume_multiplier: 1.2

  # 波动率熔断触发后，是否在撤单的同时市价清仓
  vol_close_on_pause: true
